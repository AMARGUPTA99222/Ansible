---
- name: create file & directory
  hosts: all
  become: true
  tasks:
    - name: create file
      file: 
       path: /etc/ansible/file
       state: touch
       mode: '0777'
       owner: ansadmin
       group: ansadmin

    - name: create directory
      file:
        path: /etc/ansible/direc
        state: directory
        mode: '0777'
        owner: ansadmin
        group: ansadmin
