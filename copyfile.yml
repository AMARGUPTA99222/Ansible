---
- name: this plybook for create file and directory 
  hosts: all
  become: true
  tasks:
    - name: create directory 
      file:
        path: /etc/ansible/test_dir
        state: directory
        mode: '0777'
        owner: ansadmin
        group: ansadmin

    - name: create file
      file:
        path: /etc/ansible/test_file
        state: touch
        mode: '0777'
        owner: ansadmin
        group: ansadmin

